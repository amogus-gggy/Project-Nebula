<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; }
        p { color: #555; }
        .user { 
            background: #f0f0f0; 
            padding: 10px 20px; 
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 {{ title }}</h1>
        <p>Welcome to Nebula Templates powered by Jinja2!</p>
        <div class="user">Logged in as: {{ user }}</div>
    </div>
</body>
</html>
